experiment:
  liquid: PVA_DMSO
  max_measurements_per_volume: 50
  max_total_measurements: 200
  simulate: false
  volume_targets_ml:
  - 0.05
hardware_parameters:
  aspirate_speed:
    bounds:
    - 7.5
    - 22.5
    type: discrete
  aspirate_wait_time:
    bounds:
    - 1.0
    - 3.0
    type: continuous
  blowout_vol:
    bounds:
    - 0.2
    - 0.6000000000000001
    type: continuous
  dispense_speed:
    bounds:
    - 10.0
    - 30.0
    type: discrete
  dispense_wait_time:
    bounds:
    - 1.5
    - 4.5
    type: continuous
optimization:
  enabled: true
  min_good_trials: 3
  strategy: qNEHVI
