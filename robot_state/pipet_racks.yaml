# Pipet rack configurations for tip management
# Each rack contains 48 tips with different orientations and tip ordering patterns
# orientation: horizontal or vertical (physical rack orientation)
# tip_ordering: 3x16_standard (sequential) or 3x16_reverse (reverse ordering)
#
# capture_location: name of the array in robot_state/Locator.py that holds the
#   per-tip [gripper, elbow, shoulder, z] counts. Consumed by North_Safe.
# grid_params: geometry used by the Grid Array Generator GUI to regenerate the
#   Locator array from a jogged origin cell. num_cols/num_rows describe the
#   storage layout (col * num_rows + row), inferred from the current Locator
#   arrays. Pitches (x_delta_mm, y_delta_mm) left null — fill in when known.

large_tip_rack_1:
  tip_type: large_tip
  num_tips: 48
  orientation: horizontal  # Physical orientation of the rack
  capture_location: p_capture_grid
  grid_params:
    num_cols: 16
    num_rows: 3
    x_delta_mm: 9   # step in world +X per column index (mm) — fill me
    y_delta_mm: -9   # step in world +Y per row index (mm)    — fill me
  pickup_location: null
  pickup_movement: {x: -2.2, y: 2.2, z: 50} 
  pickup_shake: {amplitude_mm: 2.0, repeats: 2, z_fraction: 0.5}
  tip_ordering: 3x16_standard  # 3 columns, 16 rows, standard layout

large_tip_rack_2:
  tip_type: large_tip
  num_tips: 48
  orientation: vertical  # Physical orientation of the rack
  capture_location: pgrid_low_2
  grid_params:
    num_cols: 3
    num_rows: 16
    x_delta_mm: 9   # step in world +X per column index (mm) — fill me
    y_delta_mm: 9   # step in world +Y per row index (mm)    — fill me
  pickup_location: null  # Uses relative movement instead
  pickup_movement: {x: -2.2, y: 2.2, z: 50}  # Relative xyz movement for pickup. THIS NEEDS ADJUSTMENT 2-25-2026
  pickup_shake: {amplitude_mm: 2.0, repeats: 2, z_fraction: 0.5}
  tip_ordering: 3x16_reverse  # 3 columns, 16 rows, reverse ordering for vertical racks

small_tip_rack_1:
  tip_type: small_tip
  num_tips: 48
  orientation: horizontal  # Physical orientation of the rack
  capture_location: p_capture_high
  grid_params:
    num_cols: 16
    num_rows: 3
    x_delta_mm: 9   # step in world +X per column index (mm) — fill me
    y_delta_mm: -9   # step in world +Y per row index (mm)    — fill me
  pickup_location: null  # Uses safe height movement
  safe_height_movement: true
  tip_ordering: 3x16_standard  # Same layout as large_tip_rack_1

small_tip_rack_2:
  tip_type: small_tip
  num_tips: 48
  orientation: vertical  # Physical orientation of the rack
  capture_location: pgrid_high_2
  grid_params:
    num_cols: 3
    num_rows: 16
    x_delta_mm: 9   # step in world +X per column index (mm) — fill me
    y_delta_mm: 9   # step in world +Y per row index (mm)    — fill me
  pickup_location: null  # Uses safe height movement
  safe_height_movement: true
  tip_ordering: 3x16_reverse  # 3 columns, 16 rows, reverse ordering for vertical racks